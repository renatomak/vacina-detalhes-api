spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://10.52.31.100:5432/goiania_saude}
    username: ${DB_USERNAME:sictec_sms}
    password: ${DB_PASSWORD:sictec_sms}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
